name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew :app:assembleDevDebug --stacktrace
      - name: Run unit tests
        run: ./gradlew test --stacktrace
      - name: Run Maestro E2E (main only)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test tests/maestro/guest_flow.yaml --format junit --output test-results/maestro.xml || true
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/reports/tests/'
      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/dev/debug/*.apk
