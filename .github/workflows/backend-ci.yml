name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: photobooth_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd backend && npm ci
      - run: cd backend && npm run build
      - run: cd backend && npm test -- --coverage --coverageReporters=text-summary
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/photobooth_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          ADMIN_API_KEY: test-key
          PAIRING_CODE: TEST_CODE
          TWILIO_ACCOUNT_SID: AC_test
          TWILIO_AUTH_TOKEN: test_auth
          TWILIO_FROM_NUMBER: '+15005550006'
