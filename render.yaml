# Render Blueprint — photobooth NestJS API + Redis
# https://render.com/docs/blueprint-spec
#
# After first sync, set secrets in Dashboard:
#   DATABASE_URL, R2_*, TWILIO_*, ADMIN_API_KEY (if not using generateValue)
#
# DATABASE_URL: use Supabase connection string (recommended) or add a `databases` block below.

services:
  - type: keyvalue
    name: photobooth-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: photobooth-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    # NODE_ENV=production skips devDeps; @nestjs/cli is required to build
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://photobooth-admin.mirsabudeen.workers.dev
      - key: PAIRING_CODE
        value: WEDDING2025
      - key: REDIS_URL
        fromService:
          name: photobooth-redis
          type: keyvalue
          property: connectionString
      - key: R2_BUCKET
        value: photobooth-media
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: APP_BASE_URL
        value: https://photobooth-admin.mirsabudeen.workers.dev
      # Placeholders until real Twilio — app requires these at boot
      - key: TWILIO_ACCOUNT_SID
        value: AC00000000000000000000000000000000
      - key: TWILIO_AUTH_TOKEN
        value: placeholder_not_used
      - key: TWILIO_FROM_NUMBER
        value: "+15550000000"
